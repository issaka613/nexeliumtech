 <!-- Bouton "Retour en haut" : HTML + style + script -->
  <button id="backToTop" aria-label="Retour en haut" title="Retour en haut" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 5l-7 7h4v7h6v-7h4l-7-7z" fill="currentColor"/>
    </svg>
  </button>

  

  <script>
    (function(){
      var btn = document.getElementById('backToTop');
      if(!btn) return;
      // montrer / cacher selon le scroll
      var onScroll = function(){
        if(window.scrollY > 300) btn.classList.add('show');
        else btn.classList.remove('show');
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      // clic -> scroll smooth vers le haut
      btn.addEventListener('click', function(){
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      // accessible via clavier (Enter / Space)
      btn.addEventListener('keydown', function(e){
        if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); btn.click(); }
      });
      // init visibility
      onScroll();
    })();
  </script>
